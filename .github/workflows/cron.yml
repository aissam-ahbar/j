name: Cron France Travail

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-offres:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_GITHUB }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run France Travail fetch
        run: node scripts/fetch_offres.js
        env:
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          FT_DISTANCE: 207

      - name: Debug files
        run: |
          echo "Files generated:"
          ls -R

      - name: Commit & push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ft-offres.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update France Travail JSON [skip ci]"
            git push
          fi
