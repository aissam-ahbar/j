# .github/workflows/cron_france_travail.yml
name: Cron France Travail

on:
  schedule:
    - cron: '0 * * * *' # toutes les heures
  workflow_dispatch:

jobs:
  fetch-offres:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm install

      # 4️⃣ Run France Travail cron avec logs détaillées
      - name: Run France Travail fetch
        run: node scripts/fetch_offres_debug.js
        env:
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          FT_MIN_DATE: ${{ secrets.FT_MIN_DATE }}   # optionnel
          FT_MAX_DATE: ${{ secrets.FT_MAX_DATE }}   # optionnel
          FT_DISTANCE: 207                           # comme ton curl

      # 5️⃣ Commit & Push automatique JSON
      - name: Commit & Push JSON
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # S'assurer d'être sur la branche main
          git checkout main
      
          # Aligner complètement le repo local avec le remote
          git fetch origin main
          git reset --hard origin/main
      
          # Ajouter le JSON généré
          git add ./data/ft-offres.json
      
          # Commit si changement
          git commit -m "Update France Travail JSON [skip ci]" || echo "No changes to commit"
      
          # Push forcé avec le PAT
    git push https://x-access-token:${PAT_GITHUB}@github.com/aissam-ahbar/j.git HEAD:main --force
