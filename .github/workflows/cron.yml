# .github/workflows/cron_france_travail.yml
name: Cron France Travail

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-offres:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo avec ton PAT pour avoir les droits push
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_GITHUB }}

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm install

      # 4️⃣ Run France Travail cron avec logs détaillées
      - name: Run France Travail fetch
        run: node scripts/fetch_offres_debug.js
        env:
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          FT_MIN_DATE: ${{ secrets.FT_MIN_DATE }}
          FT_MAX_DATE: ${{ secrets.FT_MAX_DATE }}
          FT_DISTANCE: 207

      # 5️⃣ Commit & Push automatique JSON
      - name: Commit & Push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git checkout main
          git add ./data/ft-offres.json
          git commit -m "Update France Travail JSON [skip ci]" || echo "No changes to commit"
      
          git push origin main --force
